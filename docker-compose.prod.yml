services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: localdev
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    image: medicare-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.live
    environment:
      # Override MongoDB URI to use Docker service name
      MONGODB_URI: mongodb://root:localdev@mongo:27017/medicare-ai?authSource=admin
      ENVIRONMENT: production
      API_HOST: "0.0.0.0"
      ANALYTICS_STORE_DB: "true"
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
