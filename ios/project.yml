name: MediCareAI
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: 17.0

configs:
  Debug: debug
  Release: release

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  MediCareAI:
    type: application
    platform: iOS
    sources:
      - path: MediCareAI
        excludes:
          - "**/.DS_Store"
    resources:
      - path: MediCareAI/Resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medicareai.app
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MediCare AI
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        TARGETED_DEVICE_FAMILY: 1

  MediCareAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MediCareAITests
    dependencies:
      - target: MediCareAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medicareai.app.tests
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        GENERATE_INFOPLIST_FILE: YES

  MediCareAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MediCareAIUITests
    dependencies:
      - target: MediCareAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medicareai.app.uitests
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MediCareAI:
    build:
      targets:
        MediCareAI: all
        MediCareAITests: [test]
        MediCareAIUITests: [test]
    run:
      config: Debug
      environmentVariables:
        API_BASE_URL: http://localhost:8000
        AUTH_MODE: mock
    test:
      config: Debug
      environmentVariables:
        AUTH_MODE: mock
        API_MODE: mock
        API_BASE_URL: http://localhost:8000
      targets:
        - MediCareAITests
        - MediCareAIUITests

  MediCareAI-Live:
    build:
      targets:
        MediCareAI: all
        MediCareAITests: [test]
        MediCareAIUITests: [test]
    run:
      config: Debug
      environmentVariables:
        API_BASE_URL: http://localhost:8000
        AUTH_MODE: firebase
        API_MODE: live
    test:
      config: Debug
      environmentVariables:
        AUTH_MODE: firebase
        API_MODE: live
        API_BASE_URL: http://127.0.0.1:8000
      targets:
        - MediCareAITests
        - MediCareAIUITests
