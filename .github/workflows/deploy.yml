name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Optional image tag override (defaults to commit SHA)
        required: false
        type: string

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.CONTAINER_REGISTRY }}/medicare-backend:${{ steps.vars.outputs.tag }}" \
            backend/

      - name: Push Docker image
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$CONTAINER_REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$CONTAINER_REGISTRY/medicare-backend:${{ steps.vars.outputs.tag }}"

      - name: Deploy placeholder
        run: |
          echo "Deploy image:"
          echo "${{ secrets.CONTAINER_REGISTRY }}/medicare-backend:${{ steps.vars.outputs.tag }}"
          echo "Target environment: ${{ inputs.environment }}"
          echo "Wire this step to your platform CLI (Railway/Render/Cloud Run/ECS)."
